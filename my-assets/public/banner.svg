<svg xmlns="http://w3.org" viewBox="0 0 800 200" width="100%" height="100%">
  <defs>
    <!-- Sharp retro pixel grid pattern for the background display screen matrix -->
    <pattern id="arcade-pixel-grid" width="8" height="8" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="#141923" rx="1" />
    </pattern>
    
    <!-- Mask to slice the text into authentic pixel blocks -->
    <mask id="arcade-matrix-mask">
      <rect width="100%" height="100%" fill="white" />
      <rect width="100%" height="100%" fill="url(#arcade-pixel-grid)" />
    </mask>
  </defs>

  <style>
    /* Import Google's flagship 8-bit gaming font */
    @import url('https://googleapis.com');

    .arcade-text {
      font-family: 'Press Start 2P', monospace, cubic-bezier(0,0,0,0);
      font-size: 24px;
      fill: #ff9900; /* Classic Retro Arcade Orange/Amber */
      letter-spacing: 2px;
      
      /* Clockwise animation loop - 10s for snappy gaming pace */
      animation: arcadeClockwise 10s linear infinite;
    }

    /* Heavy 8-bit neon glow effect */
    .arcade-glow-layer {
      filter: drop-shadow(0px 0px 8px rgba(255, 153, 0, 0.9));
    }

    /* Exact clockwise path coordinates adjusted for the 8-bit font scale */
    @keyframes arcadeClockwise {
      0% {
        transform: translate(45px, 70px);
      }
      25% {
        transform: translate(420px, 70px);
      }
      50% {
        transform: translate(420px, 130px);
      }
      75% {
        transform: translate(45px, 130px);
      }
      100% {
        transform: translate(45px, 70px);
      }
    }
  </style>

  <!-- Arcade Cabinet Screen Outer Frame Border -->
  <rect width="100%" height="100%" fill="#0a0e17" rx="16" stroke="#ff9900" stroke-width="4" />
  
  <!-- CRT Screen Inner Bezel Shadow -->
  <rect x="15" y="15" width="770" height="170" fill="#020408" rx="8" stroke="#1f293d" stroke-width="2" />

  <!-- Masked Moving Text Component -->
  <g mask="url(#arcade-matrix-mask)" class="arcade-glow-layer">
    <!-- EDIT TEXT CONTENT HERE -->
    <text x="0" y="0" class="arcade-text">INSERT COIN</text>
  </g>

  <!-- Visual Overlay Grid Layer for authentic 8-bit glass screen CRT scan depth look -->
  <rect x="15" y="15" width="770" height="170" fill="url(#arcade-pixel-grid)" opacity="0.35" pointer-events="none" />
</svg>